<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EİTS - Yeni Şifre</title>
    <style>
        * { box-sizing: border-box; font-family: "Segoe UI", Arial, sans-serif; }
        body { margin: 0; height: 100vh; background: linear-gradient(135deg, #6d6adf, #7c6fd6); display: flex; align-items: center; justify-content: center; }
        .reset-wrapper { width: 100%; max-width: 420px; background: white; border-radius: 22px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); }
        .reset-header { background: linear-gradient(135deg, #7c6fd6, #6d6adf); padding: 30px; text-align: center; color: white; }
        .reset-body { padding: 30px; }
        .error { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        label { font-weight: 600; font-size: 14px; display: block; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 15px; }
        .btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #6d6adf, #7c6fd6); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; }
        .password-strength { margin: -10px 0 15px; font-size: 13px; }
        .weak { color: #ef4444; }
        .medium { color: #f59e0b; }
        .strong { color: #10b981; }
        .info-box { background: #f0f9ff; border-left: 4px solid #10b981; padding: 12px; margin-bottom: 15px; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="reset-wrapper">
        <div class="reset-header">
            <h1>EİTS</h1>
            <p>Yeni Şifre Belirleyin</p>
        </div>
        <div class="reset-body">
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            
            <div class="info-box">
                ✅ Kod doğrulandı. Şimdi yeni şifrenizi belirleyin.
            </div>
            
            <form method="POST" action="/reset_password_final" onsubmit="return validateForm()">
                <label>Yeni Şifre</label>
                <input type="password" name="new_password" id="new_password" 
                       placeholder="En az 6 karakter" required minlength="6"
                       onkeyup="checkPasswordStrength()">
                <div class="password-strength" id="passwordStrength"></div>
                
                <label>Şifreyi Tekrar Girin</label>
                <input type="password" name="confirm_password" id="confirm_password" 
                       placeholder="Şifreyi tekrar girin" required minlength="6">
                
                <button type="submit" class="btn">✅ Şifreyi Güncelle</button>
            </form>
        </div>
    </div>
    
    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('new_password').value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthDiv.innerHTML = '';
                return;
            }
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            let text = 'Zayıf';
            let className = 'weak';
            
            if (strength >= 3) {
                text = 'Güçlü';
                className = 'strong';
            } else if (strength >= 2) {
                text = 'Orta';
                className = 'medium';
            }
            
            strengthDiv.innerHTML = `<span class="${className}">${text}</span>`;
        }
        
        function validateForm() {
            const pass1 = document.getElementById('new_password').value;
            const pass2 = document.getElementById('confirm_password').value;
            
            if (pass1.length < 6) {
                alert('Şifre en az 6 karakter olmalıdır');
                return false;
            }
            
            if (pass1 !== pass2) {
                alert('Şifreler uyuşmuyor!');
                return false;
            }
            
            return true;
        }
    </script>
</body>
</html>
